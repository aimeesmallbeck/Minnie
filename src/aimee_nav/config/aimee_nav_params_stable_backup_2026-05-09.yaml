# AimeeNav parameters for AIMEE Robot (Arduino UNO Q)
#
# This config is optimized for the Wave Rover + LD19 lidar combination.
# Tune values based on your environment and robot behavior.

aimee_nav:
  ros__parameters:
    # ─── LiDAR ───
    lidar_port: "/dev/ttyUSB0"
    lidar_baud: 230400
    lidar_frame_id: "base_laser"
    lidar_angle_offset_deg: 0.0
    lidar_distance_scale: 2.0

    # ─── Wave Rover Base ───
    rover_port: "/dev/ttyUSB0"
    rover_baud: 115200
    rover_http_ip: "192.168.1.56"   # HTTP mode for Wave Rover ESP32
    wheel_separation: 0.172
    wheel_radius: 0.04
    max_speed: 0.3
    angular_scale: 0.25             # Calibrated for hard floor + motor dead zone
    control_mode: "wheel_speed"     # "wheel_speed" (T=1) or "velocity" (T=13)
    accel_limit_linear: 0.5         # m/s^2  (0 = disabled)
    accel_limit_angular: 1.0        # rad/s^2 (0 = disabled)

    # ─── Local Grid Map ───
    grid_size_m: 3.0
    grid_resolution_m: 0.15
    global_map_size_m: 10.0
    global_map_resolution_m: 0.10
    obstacle_inflation_m: 0.15
    decay_time_s: 10.0

    # ─── Navigation Behavior ───
    safety_distance_m: 0.35
    goal_tolerance_m: 0.20
    replan_interval_s: 1.0
    min_clearance_m: 0.20
    navigation_mode: "planned"      # "reactive" or "planned"
    enable_exploration: false       # DISABLED for controlled turn test
    exploration_speed_scale: 0.4

    # ─── Rate & Controllers ───
    nav_rate_hz: 5.0                 # Lower rate for UNO Q headroom
    publish_decimation: 100           # Viz topics every ~20s @ 5Hz
    lidar_downsample: 6               # 60 points instead of 360 (6° resolution)
    heading_kp: 0.6
    heading_ki: 0.0
    heading_kd: 1.0
    velocity_kp: 1.0
    velocity_ki: 0.0
    velocity_kd: 0.0
    scan_match_search_angle_rad: 0.5  # ±28° search window for scan matcher
    scan_match_score_threshold: 15.0  # Min score to trust scan match correction
    heading_alignment_tolerance_rad: 0.15  # ~8.5° — rotate in place until aligned

    # ─── Safety & Behavior ───
    enable_reactive: true
    enable_planning: true
    min_frontier_size: 5
    emergency_reverse_time_s: 0.5

    # ─── TF Frames ───
    map_frame: "map"
    odom_frame: "odom"
    base_frame: "base_link"
    publish_tf: true
    publish_map_odom_tf: true  # Set to false when external SLAM provides map→odom

    # ─── Map Persistence ───
    map_save_dir: "~/aimee_maps"
    waypoints_file: ""
    localization_mode: false   # Set to true to disable map updates (load a map first)
    scan_match_interval: 0.2    # Run scan matching every 0.2s (5 Hz) with downsampling

    # ─── Yahboom IMU ───
    imu_port: "/dev/ttyCH341USB0"
    imu_baud: 115200
    enable_imu_yaw: true
    imu_yaw_variance: 0.005        # ~4° — magnetometer-fused yaw is quite reliable
    imu_yaw_scale: 1.0            # WitMotion yaw is clockwise-positive; ROS is CCW-positive
    imu_yaw_offset_deg: 0.0        # Manual mounting offset (degrees)

    # ─── Timing ───
    # nav_rate_hz and publish_decimation defined above
