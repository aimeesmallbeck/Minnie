# Wren — Arduino UNO Q #3 (Wave Rover base + OBSBOT, no arm)

robot_name: "wren"

hardware:
  base: "wave_rover"
  base_params:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 115200
    wheel_separation: 0.172
    wheel_radius: 0.04
    max_speed: 0.5
  arm: "none"
  camera: "obsbot"

software:
  monitor: true
  voice: true
  tts: true
  llm: true
  intent: true
  skills: true
  cloud: true
  cloud_params:
    ws_endpoint: "wss://aimeecloud.com/ws/v1"
    api_key: "ac_paid_demo_67890"
    robot_name: "Wren"
    robot_personality: "Adorable Brat"
    gemini_voice: "Fenrir"
    robot_config:
      has_motors: true
      has_arm: false
      has_gripper: false
      has_camera: true
      has_expressions: true
      expression_types: ["happy", "sad", "surprised", "greeting", "celebration"]
    session_context:
      ram_mb: 512
      storage_gb: 32
      cpu: "Arduino UNO Q"
      battery: "18650 Li-ion 2600mAh"
      manufacturer: "Arduino"
      model: "UNO R4 WiFi"
