# Bob — Arduino UNO Q #2 (Base + Camera, no arm)

robot_name: "bob"

hardware:
  base: "wave_rover"
  base_params:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 115200
    wheel_separation: 0.172
    wheel_radius: 0.04
    max_speed: 0.5
    http_ip: "192.168.1.52"
    control_mode: "wheel_speed"
    heartbeat_interval: 0.5
    angular_scale: 1.0
    linear_scale: 1.0
    use_serial: false            # Wave Rover base is Wi-Fi only; serial is for lidar/IMU reference
  arm: "none"
  camera: "obsbot"               # NOTE: live video is from Rocware USB webcam; OBSBOT runs PTZ/status only
  audio:
    capture_device: "default"
    playback_device: "default"
    sample_rate: 16000
  lidar: "none"
  lidar_params:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 230400
    frame_id: "base_laser"
    height: 0.18

software:
  monitor: true
  voice: true
  tts: true
  llm: true
  intent: true
  skills: true
  cloud: true
  cloud_params:
    ws_endpoint: "wss://aimeecloud.com/ws/v1"
    api_key: "ac_paid_demo_67890"
    device_id: "Bob"
    robot_name: "Bob"
    robot_personality: "You are sharp-witted, informal, and sometimes sarcastic. You aren't polite—you're loyal. You don't apologize for hallucinating; you call it creative rendering."
    gemini_voice: "Fenrir"
    user_profile: {}
    capabilities:
      input: ["voice", "text"]
      output: ["tts", "display", "motors", "led"]
    robot_config:
      has_motors: true
      has_arm: false
      has_gripper: false
      has_camera: true
      has_expressions: true
      expression_types: ["happy", "sad", "surprised", "greeting", "celebration"]
    session_context:
      robot_model: "Arduino UNO Q"
      manufacturer: "Arduino"
      cpu: "Arduino UNO Q"
      ram_mb: 512
      storage_gb: 32
      battery: "18650 Li-ion 2600mAh"
      base: "Wave Rover (Wi-Fi HTTP control, no serial)"
      camera: "Rocware RC08 USB webcam + OBSBOT Tiny 2 Lite (PTZ/status)"
      microphone: "Rocware RC08 USB audio array, 16 kHz mono PCM"
      speaker: "Rocware RC08 USB audio, PCM16 playback"
      audio_capture_device: "default (routed to Rocware RC08 via .asoundrc)"
      audio_playback_device: "default (routed to Rocware RC08 via .asoundrc)"
      lidar: "LD19 2D lidar (230400 baud, /dev/ttyUSB0)"
      imu: "Yahboom 10-axis IMU (115200 baud, /dev/ttyCH341USB0)"
      ros2_distribution: "Humble Hawksbill"
      dds_implementation: "CycloneDDS"
      workspace: "/workspace"
      protocol_version: "1.5"
      active_nodes:
        - "aimee_cloud_bridge/cloud_bridge_node"
        - "aimee_voice_manager/voice_manager_node"
        - "aimee_tts/tts_node"
        - "aimee_intent_router/intent_router_node"
        - "aimee_skill_manager/skill_manager_node"
        - "aimee_ros2_monitor/monitor_node"
        - "aimee_ugv02_controller/ugv02_controller_node"
        - "usb_cam/usb_cam_node_exe"
        - "aimee_vision_obsbot/obsbot_node"
        - "aimee_behaviors/animation_node"
        - "aimee_behaviors/marker_localization_node"
      software_features:
        - "AimeeCloud Protocol v1.5"
        - "Bidirectional PCM16 audio streaming via WebSocket"
        - "Vosk on-device STT with cloud Whisper fallback"
        - "Lemonfox cloud TTS with gTTS fallback"
        - "MQTT command and control"
        - "ROS2 monitor web dashboard at http://localhost:8081"
        - "Idle/talking base animations"
        - "ArUco marker localization"
        - "Snapshot capture and upload"
  behaviors:
    enabled: true
    idle_timeout_s: 60.0
    max_displacement_m: 0.15      # ~6 inches; hard safety limit before returning home

    # Talking animation: "random" small moves or classic "sway"
    talk_animation_mode: "random"
    talk_sway_speed_m_s: 0.015    # (only used when mode == "sway")
    talk_sway_period_s: 2.0       # (only used when mode == "sway")

    # Random talking moves: 2-6 inch forward/back/turn jitters while speaking
    talk_move_distance_min_m: 0.05  # ~2 inches
    talk_move_distance_max_m: 0.15  # ~6 inches
    talk_turn_angle_min_deg: 5.0
    talk_turn_angle_max_deg: 15.0
    talk_move_speed_m_s: 0.03
    talk_turn_speed_rad_s: 0.15
    talk_move_interval_s: 1.5

    # Idle random-move parameters
    animation_linear_speed_m_s: 0.02
    animation_angular_speed_rad_s: 0.08
    animation_move_duration_s: 1.0
    marker_size_m: 0.05
    home_marker_id: 0
