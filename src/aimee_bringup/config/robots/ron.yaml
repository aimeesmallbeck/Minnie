# Ron — Arduino UNO Q #1 (Full robot: UGV02 base + RoArm-M3 + OBSBOT)

robot_name: "ron"

hardware:
  base: "ugv02"
  base_params:
    serial_port: "/dev/ttyACM0"
    baud_rate: 115200
    wheel_separation: 0.23
    wheel_radius: 0.04
    max_speed: 0.5
  arm: "roarm_m3"
  camera: "obsbot"

software:
  monitor: true
  voice: true
  tts: true
  llm: true
  intent: true
  skills: true
  cloud: true
  cloud_params:
    ws_endpoint: "wss://aimeecloud.com/ws/v1"
    api_key: "ac_paid_demo_67890"
    device_id: "Ron"
    robot_name: "Ron"
    robot_personality: "You are sharp-witted, informal, and sometimes sarcastic. You aren't polite—you're loyal. You don't apologize for hallucinating; you call it creative rendering."
    gemini_voice: "Fenrir"
    user_profile: {}
    capabilities:
      input: ["voice", "text"]
      output: ["tts", "display", "motors", "led", "arm"]
    robot_config:
      has_motors: true
      has_arm: true
      has_gripper: true
      has_camera: true
      has_expressions: true
      expression_types: ["happy", "sad", "surprised", "greeting", "celebration"]
    session_context:
      robot_model: "Arduino UNO Q"
      manufacturer: "Arduino"
      cpu: "Arduino UNO Q"
      ram_mb: 512
      storage_gb: 32
      battery: "18650 Li-ion 2600mAh"
      base: "Waveshare UGV02 (serial control)"
      camera: "OBSBOT Tiny 2 Lite"
      ros2_distribution: "Humble Hawksbill"
      dds_implementation: "CycloneDDS"
      workspace: "/workspace"
      protocol_version: "1.5"
